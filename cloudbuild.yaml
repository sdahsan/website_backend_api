steps:
  # 1. Build the backend container image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/cloudrun-repos/Website-backend-api:$COMMIT_SHA', 
      '.'
    ]

  # 2. Push it to your Artifact Registry warehouse
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push', 
      'us-central1-docker.pkg.dev/$PROJECT_ID/cloudrun-repos/Website-backend-api:$COMMIT_SHA'
    ]

  # 3. Deploy it live to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args: [
      'run', 'deploy', 'syeds-ai-assistant-backend',
      '--image', 'us-central1-docker.pkg.dev/$PROJECT_ID/cloudrun-repos/Website-backend-api:$COMMIT_SHA',
      '--region', 'us-central1',
      '--min-instances', '0',
      '--max-instances', '1',
      '--allow-unauthenticated'
    ]

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloudrun-repos/Website-backend-api:$COMMIT_SHA'
